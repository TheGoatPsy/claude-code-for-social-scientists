site_name: Claude Code for Social Scientists
site_description: >-
  A bilingual (Turkish + English) open-source guide for social scientists using
  Anthropic's Claude Code in research, teaching, and academic writing.
  Sosyal bilimciler için iki dilli açık kaynak Claude Code rehberi.
site_url: https://thegoatpsy.github.io/claude-code-for-social-scientists/
repo_url: https://github.com/TheGoatPsy/claude-code-for-social-scientists
repo_name: TheGoatPsy/claude-code-for-social-scientists
copyright: >-
  Code: Apache-2.0 · Prose and booklets: CC-BY-NC-SA-4.0 ·
  © 2026 Onour Impram (ORCID 0000-0003-1076-3928)

docs_dir: .
site_dir: _site

exclude_docs: |
  _site/
  web/
  node_modules/
  .git/
  .github/
  .claude/
  src/
  scripts/
  template/
  meta/
  tests/
  paper/
  assets/*.json
  assets/*.svg
  package.json
  package-lock.json
  pyproject.toml
  LICENSE
  SECURITY.md
  CODE_OF_CONDUCT.md
  CONTRIBUTING.tr.md
  README.tr.md
  AI-AUTHORSHIP.md
  CHANGELOG.md
  mkdocs.yml

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - same-dir
  - search:
      lang:
        - en
        - tr

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: README.md
  - Catalog: CATALOG.md
  - Contributing: CONTRIBUTING.md

  - "001 Foundations / Temeller":
      - "001-01-0001 — What is Claude Code? (EN)": booklets/001-foundations/001-01-0001/en.md
      - "001-01-0001 — Claude Code Nedir? (TR)": booklets/001-foundations/001-01-0001/tr.md
      - "001-01-0002 — The Agentic Shift (EN)": booklets/001-foundations/001-01-0002/en.md
      - "001-01-0002 — Aracın Ötesine Geçiş (TR)": booklets/001-foundations/001-01-0002/tr.md
      - "001-01-0003 — Installation and First Session (EN)": booklets/001-foundations/001-01-0003/en.md
      - "001-01-0003 — Kurulum ve İlk Oturum (TR)": booklets/001-foundations/001-01-0003/tr.md
      - "001-01-0004 — CLAUDE.md Discipline (EN) [draft]": booklets/001-foundations/001-01-0004/en.md
      - "001-01-0004 — CLAUDE.md Disiplini (TR) [taslak]": booklets/001-foundations/001-01-0004/tr.md

